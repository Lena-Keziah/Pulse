</nav><div class="container-fluid py-5" style="background-color: #CC0033;">
  <div class="container">
    <div class="row justify-content-center align-items-stretch g-4">

      <!-- LEFT CARD (Profile) -->
      <div class="col-lg-4 col-md-5 col-sm-12">
    <div class="card rounded-4 shadow-sm text-center h-100" style="border: none;">
        <div class="card-body d-flex flex-column align-items-center py-4">
            
            <div class="profile-image-container" style="position: relative; width: 130px; margin-bottom: 15px;">
                <img id="profile-img" 
                     src="/Assets/portrait-young-woman-smiling-isolated.jpg" 
                     class="rounded-circle" 
                     style="width: 130px; height: 130px; object-fit: cover;" 
                     alt="profile">
                
                <div id="camera-icon" style="position: absolute; bottom: 5px; right: 5px; cursor: pointer; background: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                    📸
                </div>
                <input type="file" id="file-input" style="display:none" accept="image/*">
            </div>

            <h5 class="fw-bold mb-1" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span id="profile-name">Grace Manyi</span>
                <span id="edit-name-icon" style="cursor: pointer; font-size: 0.9rem;">✏️</span>
            </h5>
            
            <p id="profile-status" class="text-primary fw-semibold mb-0">Donating</p>
            
        </div>
    </div>
</div>

      <!-- RIGHT CARD (Details) -->
      <div class="col-lg-7 col-md-7 col-sm-12">
        <div class="card rounded-4 shadow-sm p-4 h-100" style="border: none;">
          <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
            <h6 class="fw-bold mb-0">Bio and Other details</h6>
            <i class="bi bi-pencil" style="cursor: pointer;"></i>
          </div>

          <div class="row gx-4 gy-3">

            <!-- Each detail has its own underline -->
            <div class="col-md-6">
              <div class="d-flex justify-content-between align-items-center border-bottom pb-2">
                <span class="text-muted">Blood Group</span>
                <span class="fw-semibold">O+</span>
              </div>
            </div>

            <div class="col-md-6">
              <div class="d-flex justify-content-between align-items-center border-bottom pb-2">
                <span class="text-muted">Sex</span>
                <span class="fw-semibold">Female</span>
              </div>
            </div>

            <div class="col-md-6">
              <div class="d-flex justify-content-between align-items-center border-bottom pb-2">
                <span class="text-muted">Location</span>
                <span class="fw-semibold">Buea, Cameroon</span>
              </div>
            </div>

            <div class="col-md-6">
              <div class="d-flex justify-content-between align-items-center border-bottom pb-2">
                <span class="text-muted">Phone</span>
                <span class="fw-semibold">679174405</span>
              </div>
            </div>

            <div class="col-md-6">
              <div class="d-flex justify-content-between align-items-center border-bottom pb-2">
                <span class="text-muted">Age</span>
                <span class="fw-semibold">34</span>
              </div>
            </div>

            <div class="col-md-6">
              <div class="d-flex justify-content-between align-items-center border-bottom pb-2">
                <span class="text-muted">Eligibility</span>
                <span class="fw-semibold">Eligible</span>
              </div>
            </div>

            <!-- Switches -->
            <div class="col-md-6 d-flex justify-content-between align-items-center mt-3">
              <span class="text-muted">Donating</span>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" checked>
              </div>
            </div>
            <div class="col-md-6 d-flex justify-content-between align-items-center mt-3">
              <span class="text-muted">Requesting</span>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox">
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>


<script defer src="/javascript/bootstrap.bundle.min.js"></script>
<script defer src="/javascript/evenprofile.js"></script>
