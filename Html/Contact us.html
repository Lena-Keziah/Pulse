<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="/CSS/bootstrap.min.css">
    <link rel="stylesheet" href="/CSS/Contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container-fluid min-vh-100">
        <div class="row min-vh-100">

            <div class="col-12 col-md-6 d-flex flex-column gap-2 p-3">
                
                <div class="bg-white p-0 rounded shadow overflow-hidden" style="height: 400px; border: 1px solid #003366;">
                    <img src="/Assets/8009057-removebg-preview.png" 
                         alt="pic" 
                         class="w-100 h-100 object-fit-fill img-fluid">
                </div>

                <div class="p-3 rounded shadow" style="border: 1px solid #003366; color: #003366; background: white;">
                    <h6><i class="fa-solid fa-envelope me-2"></i>Email</h6>
                    <p>pulse@gmail.com</p>

                    <h6><i class="fa-solid fa-phone me-2"></i>Phone</h6>
                    <p>+237 672867776 / 679174405</p>
                </div>
            </div>

            <div class="right-card col-12 col-md-6 bg-light d-flex align-items-center justify-content-center p-4">
                <form class="w-100 bg-white p-4 rounded shadow" style="border: 2px solid #CC0033;">
                    <h4 class="mb-4 text-center">Contact Us</h4>
                    
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter your Name" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="e.g example@gmail.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" placeholder="e.g +237 ### ### ###" required>
                    </div>

                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="4" placeholder="Type a message..." required></textarea>
                    </div>

                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-danger" style="background-color: #CC0033; border: none;">Send Message</button>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <div class="d-flex justify-content-end p-3">
        <a href="/index.html" class="btn fw-bold rounded-3 border-0 p-2 px-3 text-decoration-none" style="background:#003366; color: white;">
            Home <span class="ms-1">&rsaquo;</span>
        </a>
    </div>

</body>
</html>
