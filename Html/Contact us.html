<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="/CSS/bootstrap.min.css">
         <link rel="stylesheet" href="/CSS/Contact.css">
</head>
<body>
    <div class="container-fluid vh-100">
  <div class="row h-100">

    <!-- Left column (50% width) -->
     
    <div class="col-6 d-flex flex-column gap-2 p-3" style="height: 100%;">
      <!-- Top container (2/3 height) -->
      <div class="bg-primary text-white p-4 rounded shadow" style="height: 66%;">
        <!--<img src="/Assets/8009057.jpg" 
           class="img-fluid" alt="pic">-->
      </div>
 
      <!-- Bottom container (1/3 height) -->
      <div class="bg-secondary text-white p-3 rounded shadow" style="height: 34%;">
        <h6>Container 2 (Smaller)</h6>
        <p>Some content here...</p>
      </div>
    </div>

    <!-- Right column (50% width) -->
    <div class="right-card col-6 bg-light d-flex align-items-center justify-content-center p-4">
      <form class="w-100 bg-white p-4 rounded shadow">
        <h4 class="mb-4 text-center">Contact Us</h4>
        
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="name" placeholder="Your Name" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phone" placeholder="+1234567890" required>
        </div>

        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea class="form-control" id="message" rows="4" placeholder="Your message" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">Send Message</button>
      </form>
    </div>

  </div>
</div>
<a href="/index.html"class="button">Back</a>
</body>
</html>
